<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para el amor de mi vida</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Great+Vibes&display=swap"
    rel="stylesheet"
  />
  <link href="https://fonts.cdnfonts.com/css/super-popstar" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />

  <link rel="icon" href="imagenes/icono.jpg" type="image">

</head>
<body>
  <div class="layout">
    <div class="scene">
      <div class="cake">
        <div class="plate"></div>

        <div class="layer layer-bottom"></div>
        <div class="layer layer-middle"></div>
        <div class="layer layer-top"></div>

        <div class="icing"></div>

        <div class="candles">
          <div class="candle candle-1">
            <div class="flame"></div>
          </div>
          <div class="candle candle-2">
            <div class="flame"></div>
          </div>
          <div class="candle candle-3">
            <div class="flame"></div>
          </div>
        </div>

        <div class="sprinkles">
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <div class="message">
      <div class="happy">HAPPY</div>
      <div class="birthday">BIRTHDAY</div>
      <div class="love">My Love</div>
    </div>
  </div>

  <button
    class="btn_second_page"
    type="button"
    onclick="goSecondPage(this)"
    aria-label="Go to second page"
  >
    <span class="heart">❤</span>
  </button>

  <script>
    function goSecondPage(btn) {
      btn.blur();
      window.location.href = "cartita.html";
    }

    window.addEventListener("pageshow", function () {
      const active = document.activeElement;
      if (active && active !== document.body && typeof active.blur === "function") {
        active.blur();
      }
    });
  </script>
</body>
</html>

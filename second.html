<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Configuración básica del documento -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Título que aparece en la pestaña del navegador -->
  <title>Cartita</title>

  <!-- Enlace al archivo de estilos -->
  <link rel="stylesheet" href="style2.css" />
</head>
<body>
  <main>
    <!-- Contenedor principal del sobre y la hoja -->
    <div class="container-letter">
      <!-- Solapa superior del sobre -->
      <div class="cover"></div>

      <!-- Hoja de la carta con el mensaje -->
      <p class="paper" id="mainMessage">
        En este día especial de amor y amistad, celebremos los lazos que nos unen.
        Que la alegría y el cariño nos acompañen siempre. ¡Feliz día!
      </p>

      <!-- Parte inferior del sobre -->
      <div class="letter"></div>
    </div>

    <!-- Botones para abrir y cerrar la carta -->
    <div class="options">
      <button id="open">Abrir</button>
      <button id="close">Cerrar</button>
    </div>
  </main>

  <!-- Archivo JavaScript para la interacción -->
  <script src="script.js"></script>
</body>
</html>
